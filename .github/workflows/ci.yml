name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: "Build and Push"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: api/yarn.lock

      - name: Install dependencies
        run: yarn
        working-directory: api

      - name: Run tests
        run: yarn test
        working-directory: api
