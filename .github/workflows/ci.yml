name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: "Build and Push"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node | ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
          cache-dependency-path: api/yarn.lock

      - name: Install dependencies
        run: yarn
        working-directory: api

      - name: Run tests
        run: yarn test
        working-directory: api

      - name: Generate tag
        id: generate_tag
        run: |
          SHA=${GITHUB_SHA:0:7}
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Login into the container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: popotomimi/rocketseat-ci-api:${{ steps.generate_tag.outputs.sha }}, popotomimi/rocketseat-ci-api:latest

      # - name: Build docker image
      #   run: docker build -t popotomimi/rocketseat-ci-api:${{ steps.generate_tag.outputs.sha }} .
      #   working-directory: api

      # - name: Push image
      #   run: docker push popotomimi/rocketseat-ci-api:${{ steps.generate_tag.outputs.sha }}
